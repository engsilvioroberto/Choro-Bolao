<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal Oficial de Reclamações</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #333; }
        blockquote {
            font-style: italic;
            color: #555;
            background: #eee;
            padding: 15px;
            border-left: 5px solid #ff4757;
            margin: 20px 0;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn-choro { background-color: #ff4757; color: white; font-size: 1.2em; }
        .btn-aceitar { background-color: #2ed573; color: white; font-size: 0.9em; }
        .btn:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <h1>Ouvidoria do Líder</h1>
    <p>Antonio, sentimos muito que a liderança do Silvio esteja incomodando tanto. Segue o registro da sua indignação:</p>
    
    <blockquote>
        “Cravou 5x1 o Silvio. Se fuder essa belgica e esse grupo lixo. Passou em 1o com 5 pontos. Vagabundos”
    </blockquote>

    <a href="mailto:seuemail@exemplo.com?subject=Meu%20Choro%20para%20o%20Silvio" class="btn btn-choro">Mande seu choro agora para o Silvio</a>
    
    <a href="javascript:alert('Sabia escolha! A liderança segue firme.')" class="btn btn-aceitar">Aceitar (porque dói menos)</a>
</div>

</body>
</html>
